name: Run Analysis

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:  # allow manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python lfp_analysis_verified.py -p 2023 -o LFP_Recycling_Verified.png

      - name: Upload chart
        uses: actions/upload-artifact@v4
        with:
          name: LFP_Recycling_Verified
          path: LFP_Recycling_Verified.png
